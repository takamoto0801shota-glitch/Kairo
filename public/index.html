<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kairohelp.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header mobile-header">
            <div class="header-main">
                <div class="header-main__left" aria-hidden="true"></div>
                <div class="header-title">Kairo</div>
                <div class="header-main__right">
                    <div class="header-location-stack" aria-label="現在地">
                        <div class="header-location-row">
                            <div id="locationStatus" class="location-status">📍現在地を未確認</div>
                            <button id="locationButton" class="location-button" type="button">位置情報を許可する</button>
                        </div>
                    </div>
                    <button id="clearButton" class="clear-button header-reset" title="新しい会話を始める" type="button">はじめから</button>
                </div>
            </div>
        </div>
        
        <div id="summaryCard" class="summary-card" style="display: none;">
            <!-- 安心サマリーがここに表示される -->
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- メッセージがここに追加される -->
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                id="userInput" 
                class="chat-input" 
                placeholder="どんな感じですか？"
                autocomplete="off"
            >
            <button id="sendButton" class="send-button" type="button" aria-label="送る">
                <svg class="send-button__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 19V5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M6 11l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
